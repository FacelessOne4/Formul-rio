<!DOCTYPE html>
<html lange="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário da Pré-Matrícula</title>
</head>
<body>
    <h1 align="center"><font color="green">SENAC</font></h1>
 <h2 align="center">Formulário de Pré-Matrícula</h2>
 <hr <font color="green"></font>

 <h3><font color="green">Dados do Aluno</font></h3>
 <div>
    <label for="nome">Nome Completo</label>
    <p></p>
    <input type="text" for="nome" required>
    <b></b>
    <p></p>
</div>
<div>
    <label for="email">Email</label>
    <p></p>
    <input type="text" for="nome" required>
</div>
<div>
    <br>
    <label for="Telefone">Telefone</label>
    <p></p>
    <input type="number" placeholder="(xx)xxxxx-xxxx">
</div>
<p></p>
<div>
    <label for="data de incricao">Data de Inscrição</label>
    <p></p>
    <input type="date">
 </div>
 <br>
 <label for="favcolor">Select your favorite color:</label>
 <br>
 <input type="color" name="cor_favorita" value="red">
 <br>

 <h3><font color="green">Curso</font></h3>
 <label for="Curso_Interesse"><b>Escolha o Curso:</b></label>
                <br>
                <input list="Curso_Interesse">
                <datalist id="Curso_Interesse">
                    <option value="Informática"></option>
                    <option value="Back-end"></option>
                    <option value="Técnico em Informática para Internet"></option>
                    <option value="Desing"></option>
                    <option value="Marketing"></option>
                </datalist>

 <h4>Período:</h4>
 <input type="checkbox"> Manhã
 <br>
 <input type="checkbox"> Tarde
 <br>
 <input type="checkbox"> Noite

 <h3><font color="green">Conhecimentos Prévios</font></h3>
<input type="checkbox"> HTML
<br>
<input type="checkbox"> JavaScript
<br>
<input type="checkbox"> Banco de Dados
<br>
<input type="checkbox"> Nenhum Conhecimento
<br>
<h3><font color="green">Avaliação Inicial</font></h3>
<h4>Nível de conhecimento em tecnologia</h4>
<div>
<label for="nivel_experiencia"></label>
<input type="range" min="0" max="10" value="5">
</div>
<h3><font color="green">Documentos</font></h3>
<div>
    <label for="comprovante">Enviar Documento:</label>
    <br>
    <input type="file">
</div>
<h3><font color="green">Termos</font></h3>
<input type="checkbox"> Li e concordo com os termos da matrícula 
 
</body>
</html>
