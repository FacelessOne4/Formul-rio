<!DOCTYPE html>
<html lange="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário</title>
</head>
<body>
    <h1>Inscrição para TECSENAC 2026</h1>
    <p>Preencha o formulário abaixo para garantir sua vaga no maior evento de tecnologia do ano!</p>
    <form>
        <fieldset>
            <legend>informações pessoais</legend>
         <div>
            <label for="nome">Nome Completo</label>
            <input type="text" for="nome" required>
         </div>
         <div>
            <label for="email">Email</label>
            <input type="email" required> 
         </div>
         <div>
            <label for="telefone">Telefone</label>
            <input type="number" placeholder="(xx)xxxxx-xxxx">
         </div>
         <div>
            <label for="nascimento">Data de Nascimento</label>
            <input type="date">
         </div>

        </fieldset>
        <fieldset>
            <legend>Preferências do Evento</legend>
            <div>
                <label for="tipo">Tipo de inscrição (escolha uma)</label>
                <div>
                    <input type="radio" value="estudante" name="tipo_inscricao">
                    <label for="estudante">Estudante</label>
                </div>
                <div>
                    <input type="radio" value="profissional" name="tipo_inscricao">
                    <label for="profissional">Profissional</label>
                </div>
                <div>
                    <input type="radio" value="aposentado" name="tipo_inscricao">
                    <label for="aposentado">Aposentado</label>
                </div>
                <p></p>
                <label for="interesses">Aréas de Interesse (pode marcar várias opções)</label>
                <div>
                    <input type="checkbox" name="interesses[]">
                    <label>Desenvolivmento Web</label>
                </div>
                <div>
                    <input type="checkbox" name="interesses[]">
                    <label>Ciência de dados</label>
            </div>
            <div>
                <input type="checkbox" name="interesses[]">
                <label>Inteligência artificial</label>
                <div>
                    <p></p>
                    <label for="nivel_experiencia">Seu nivel de experiencia (0 a 10)</label>
                    <input type="range" min="0" max="10" value="5">
                </div>
                <div>
                    <label for="palestra">Qual a palestra te interessa?</label>
                    <input list="sugestoes_palestras">
                    <details id="sugestoes_palestras">
                        <option value="O futuro do React"></option>
                        <option value="Machine Learning na prática"></option>
                        <option value="Desing Systems com figma"></option>
                    </details>
                </div>
            </div>
            
        </fieldset>
        <fieldset>
            <legend>Extras</legend>
            <div>
                <label for="cor_cracha">Cor preferida para seu cracha:</label>
                <input type="color" name="cor_cracha" value="red">
            </div>
            <div>
                <label for="comprovante">Anexar comprovante do estudante (opcional)></label>
                <input type="file">
            </div>
            <label for="observacoes">Observações:</label>
            <textarea name="observacoes" id="observacoes" rows="4"></textarea>
        </fieldset>
        <div>
            <button type="submit">Garanta sua vaga</button>
            <button type="reset">Limpar o formulário</button>
        </div>
    </form>
 
</body>
</html>
